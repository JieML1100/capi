<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CapiWeb Sample</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f7f5;
      color: #17211d;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    main {
      width: min(880px, calc(100vw - 32px));
      display: grid;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 650;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: #516158;
      line-height: 1.55;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe4df;
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 12px 34px rgba(23, 33, 29, 0.08);
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      background: #1f6f5b;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    input {
      min-width: 110px;
      padding: 9px 10px;
      border: 1px solid #cbd7d0;
      border-radius: 6px;
      font: inherit;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: #10211c;
      color: #d9fff1;
      border-radius: 6px;
      padding: 14px;
      min-height: 92px;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>CapiWeb</h1>
      <p>HTTP.sys-hosted C++ WebAPI and static frontend from one listener.</p>
    </section>

    <section class="panel">
      <div class="row">
        <button id="health">GET /api/health</button>
        <button id="metrics">GET /api/metrics</button>
        <button id="openapi">GET /openapi.json</button>
        <button id="docs">/docs</button>
        <input id="name" value="cpp">
        <button id="echo">GET /api/echo/{name}</button>
        <input id="bindId" type="number" value="7">
        <input id="multiplier" type="number" value="6">
        <button id="bind">GET /api/bind/{id}</button>
        <input id="a" type="number" value="20">
        <input id="b" type="number" value="22">
        <button id="sum">POST /api/sum</button>
        <input id="apiKey" value="demo-secret">
        <button id="secure">GET /api/secure</button>
      </div>
    </section>

    <pre id="output">Ready.</pre>
  </main>

  <script>
    const output = document.querySelector("#output");
    const jsonHeaders = { Accept: "application/json" };

    const show = async (promise) => {
      try {
        const response = await promise;
        const text = await response.text();
        const contentType = response.headers.get("content-type") || "";
        const preview = text.length > 800 ? `${text.slice(0, 800)}...` : text;
        if (contentType.toLowerCase().includes("application/json")) {
          try {
            output.textContent = `${response.status} ${response.statusText}\n${JSON.stringify(JSON.parse(text), null, 2)}`;
          } catch (parseError) {
            output.textContent = `${response.status} ${response.statusText}\nInvalid JSON response (${contentType})\n${preview}\n\n${parseError}`;
          }
        } else {
          output.textContent = `${response.status} ${response.statusText}\n${contentType || "unknown content-type"}\n${preview}`;
        }
      } catch (error) {
        output.textContent = String(error);
      }
    };

    document.querySelector("#health").addEventListener("click", () => {
      show(fetch("/api/health", { headers: jsonHeaders }));
    });

    document.querySelector("#metrics").addEventListener("click", () => {
      show(fetch("/api/metrics", { headers: jsonHeaders }));
    });

    document.querySelector("#openapi").addEventListener("click", () => {
      show(fetch("/openapi.json", { headers: jsonHeaders }));
    });

    document.querySelector("#docs").addEventListener("click", () => {
      window.location.href = "/docs";
    });

    document.querySelector("#echo").addEventListener("click", () => {
      const name = encodeURIComponent(document.querySelector("#name").value || "cpp");
      show(fetch(`/api/echo/${name}`, { headers: jsonHeaders }));
    });

    document.querySelector("#bind").addEventListener("click", () => {
      const id = encodeURIComponent(document.querySelector("#bindId").value || "0");
      const multiplier = encodeURIComponent(document.querySelector("#multiplier").value || "1");
      show(fetch(`/api/bind/${id}?multiplier=${multiplier}`, { headers: jsonHeaders }));
    });

    document.querySelector("#sum").addEventListener("click", () => {
      const a = Number(document.querySelector("#a").value || "0");
      const b = Number(document.querySelector("#b").value || "0");
      show(fetch("/api/sum", {
        method: "POST",
        headers: { ...jsonHeaders, "Content-Type": "application/json" },
        body: JSON.stringify({ a, b })
      }));
    });

    document.querySelector("#secure").addEventListener("click", () => {
      const key = document.querySelector("#apiKey").value || "";
      show(fetch("/api/secure", {
        headers: { ...jsonHeaders, "X-API-Key": key }
      }));
    });
  </script>
</body>
</html>
